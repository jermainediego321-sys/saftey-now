<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#051728"/>
  <title>Sasol Safety — Loading</title>

  <style>
    :root{
      /* Brandish blues */
      --bg-1:#051728;         /* deep navy */
      --bg-2:#0a2644;         /* midnight blue */
      --bg-3:#0f3a6a;         /* accent blue */
      --glow:#39a9ff;         /* cyan glow */
      --text:#e9f4ff;         /* high contrast text */
      --muted:#9db8cc;        /* secondary text */

      /* Sizing */
      --radius:22px;
      --pad: clamp(16px, 3vw, 28px);
      --orb-size: clamp(180px, 38vmin, 520px);
      --ring: 90vmax; /* background radial size */
    }

    /* Reset + base */
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      color: var(--text);
      font: 500 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% 10%, #0b315b55 0%, transparent 55%) ,
                  radial-gradient(var(--ring) var(--ring) at 80% 85%, #0b315b44 0%, transparent 60%),
                  linear-gradient(180deg, var(--bg-1), var(--bg-2));
      background-attachment: fixed;
      overflow: hidden;
    }

    /* Very subtle animated sheen on the background */
    @keyframes drift {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 120px 60px, -120px -80px, 0 0; }
    }
    body { animation: drift 18s linear infinite; }
    @media (prefers-reduced-motion: reduce){
      body { animation: none; }
    }

    /* Layout */
    .stage{
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: grid;
      place-items: center;
    }

    /* Card */
    .hero{
      width: min(94vw, 980px);
      border-radius: var(--radius);
      padding: calc(var(--pad) * 1.25) var(--pad);
      backdrop-filter: blur(10px) saturate(1.2);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 25px 60px -25px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.06),
        0 0 120px -30px var(--glow);
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
    }

    /* Orb container (always a square) */
    .orb{
      width: var(--orb-size);
      height: var(--orb-size);
      display: grid;
      place-items: center;
      position: relative;
      border-radius: 24px;
      background:
        radial-gradient(90% 90% at 30% 20%, rgba(57,169,255,0.25), transparent 60%),
        radial-gradient(110% 110% at 70% 80%, rgba(12,77,162,0.25), transparent 60%);
      box-shadow:
        inset 0 0 60px rgba(57,169,255,0.15),
        inset 0 0 180px rgba(12,77,162,0.18);
    }

    /* Canvas fills the square exactly */
    #orb3d {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 18px;
    }

    .brand{
      margin: 8px 0 0 0;
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: clamp(18px, 2.2vw, 22px);
      color: var(--text);
    }
    .tagline{
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 1.8vw, 16px);
    }

    /* Dots loader for the tagline */
    .dots::after{
      content: "·";
      animation: dots 1.5s steps(1, end) infinite;
      display: inline-block;
      width: 1.5ch;
      text-align: left;
    }
    @keyframes dots {
      0%   { content:"·"; }
      33%  { content:"··"; }
      66%  { content:"···"; }
      100% { content:"·"; }
    }

    .meta{
      margin-top: 6px;
      color: #88a6bb;
      font-size: 12px;
    }

    /* Skip link (optional) */
    .skip{
      position: fixed;
      top: 12px;
      right: 12px;
      color: #bfe4ff;
      text-decoration: none;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      transition: transform .15s ease, background .15s ease;
      z-index: 2;
    }
    .skip:hover{ transform: translateY(-1px); background: rgba(255,255,255,0.12); }

    /* Accessibility */
    @media (prefers-contrast: more){
      .hero{ border-color: rgba(255,255,255,0.4); }
      .skip{ border-color: rgba(255,255,255,0.6); }
    }

    /* No-JS fallback style */
    noscript{
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: #0b1c2d;
      color: var(--text);
      padding: 24px;
      text-align: center;
    }
    noscript a{ color:#7ec7ff; }
  </style>
</head>

<body>
