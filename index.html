<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasol Safety | Loading</title>
    <!-- Instant Redirect to the login page in your subfolder -->
    <meta http-equiv="refresh" content="3; url=./SafetyNowMobileApp/login.html">
    <style>
        body { background-color: #051728; color: #e9f4ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #0a2644; border-top: 4px solid #39a9ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #39a9ff; text-decoration: none; margin-top: 15px; font-size: 0.9em; border: 1px solid #39a9ff; padding: 8px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Sasol Safety</h1>
    <p>Redirecting to login...</p>
    <a href="./SafetyNowMobileApp/login.html">Click here if not redirected</a>
    <script>
        setTimeout(function() { window.location.href = "./SafetyNowMobileApp/login.html"; }, 3000);
    </script>
</body>
</html>
