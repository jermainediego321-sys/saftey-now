<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafetyNow • Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#051423; --bg2:#0a2340; --glow:#1ea0ff; --text:#e8eef6;
      --muted:#cbd5e1; --card:rgba(255,255,255,0.04); --stroke:rgba(255,255,255,0.1);
      --focus:rgba(30,160,255,.35); --btn:#1ea0ff; --btn-hover:#1594ee;
    }

    * { box-sizing:border-box }
    body{
      font-family:"Inter",sans-serif; color:var(--text);
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; margin:0; overflow-x:hidden;
    }

    /* Background animations */
    .energy{ position:fixed; inset:-20%; background: radial-gradient(closest-side, rgba(30,160,255,.12), transparent 70%) 20% 30% / 50vmax 50vmax no-repeat; filter:blur(60px); animation: drift 15s infinite alternate; pointer-events:none; }
    @keyframes drift{ from{transform:translate(-2%,2%)} to{transform:translate(2%,-2%)} }

    .wrap{ position:relative; z-index:10; width:min(420px, 90vw); }
    .card{ background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--stroke); border-radius:24px; padding:32px; box-shadow:0 20px 50px rgba(0,0,0,0.3); }

    .mark{ width:80px; height:80px; margin:0 auto 20px; background:rgba(255,255,255,0.05); border-radius:20px; display:grid; place-items:center; border:1px solid var(--stroke); }
    .logo{ width:50px; height:auto; }

    h1{ text-align:center; font-family:"Plus Jakarta Sans"; font-size:24px; margin:0 0 8px; }
    .sub{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:24px; }

    form{ display:grid; gap:16px; }
    .field{ display:grid; gap:6px; }
    label{ font-size:13px; color:var(--muted); }
    
    /* Input Fix: Changed background to dark to match theme */
    input {
      width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--stroke);
      background: rgba(255,255,255,0.05); color: white; font-size:16px;
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus{ border-color:var(--glow); outline:none; box-shadow:0 0 0 3px var(--focus); }

    .btn{ padding:14px; border-radius:10px; background:var(--btn); color:white; font-weight:700; border:0; cursor:pointer; margin-top:8px; transition:0.2s; }
    .btn:hover{ background:var(--btn-hover); transform:translateY(-1px); }
    .error{ color:#ff6b6b; font-size:13px; text-align:center; display:none; }
  </style>
</head>
<body>
  <div class="energy"></div>
  <main class="wrap">
    <section class="card">
      <div class="mark">
        <!-- FIXED: Added fallback for logo -->
        <img src="assets/sasol-logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      </div>
      <h1>Sign in to SafetyNow</h1>
      <p class="sub">Enter your workplace details to continue.</p>

      <form id="loginForm">
        <div class="field">
          <label>Full Name</label>
          <input id="fullname" type="text" placeholder="John Doe" required>
        </div>
        <div class="field">
          <label>Mobile Number</label>
          <input id="phone" type="tel" placeholder="082 123 4567" required>
        </div>
        <div class="field">
          <label>Site / Office</label>
          <input id="site" type="text" placeholder="Secunda" required>
        </div>
        <button class="btn" type="submit">Continue</button>
        <div id="err" class="error">Please fill in all fields correctly.</div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const fullname = document.getElementById("fullname").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const site = document.getElementById("site").value.trim();

      if (!fullname || !phone || !site) {
        document.getElementById("err").style.display = "block";
        return;
      }

      localStorage.setItem("pending_login", JSON.stringify({ fullname, phone, site }));
      
      // FIXED: Path for GitHub Pages redirection
      window.location.href = "verify.html";
    });
  </script>
</body>
</html>
